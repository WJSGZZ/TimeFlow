name: tfapp
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  webview_flutter: ^4.10.0
  webview_flutter_android: ^4.3.0
  shared_preferences: ^2.3.0
  flutter_svg: ^2.0.10
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  home_widget: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo_1024.png"
  adaptive_icon_background: "#F5F0E8"
  adaptive_icon_foreground: "assets/logo_1024.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.svg