<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8F3EC"/>
      <stop offset="100%" stop-color="#F0EAE1"/>
    </linearGradient>

    <!-- 三条线的渐变（从左暖光到右消散）-->
    <linearGradient id="line1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#FFD8C0" stop-opacity="0.6"/>
      <stop offset="22%"  stop-color="#CF6347" stop-opacity="1"/>
      <stop offset="75%"  stop-color="#CF6347" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#CF6347" stop-opacity="0.28"/>
    </linearGradient>

    <linearGradient id="line2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#FFD8C0" stop-opacity="0.45"/>
      <stop offset="22%"  stop-color="#CF6347" stop-opacity="0.75"/>
      <stop offset="75%"  stop-color="#CF6347" stop-opacity="0.62"/>
      <stop offset="100%" stop-color="#CF6347" stop-opacity="0.20"/>
    </linearGradient>

    <linearGradient id="line3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#FFD8C0" stop-opacity="0.30"/>
      <stop offset="22%"  stop-color="#CF6347" stop-opacity="0.50"/>
      <stop offset="75%"  stop-color="#CF6347" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#CF6347" stop-opacity="0.12"/>
    </linearGradient>

    <!-- 左侧光晕 -->
    <radialGradient id="glow" cx="25%" cy="50%" r="40%">
      <stop offset="0%"   stop-color="#FFD8C0" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FFD8C0" stop-opacity="0"/>
    </radialGradient>

    <clipPath id="shape">
      <rect width="512" height="512" rx="110"/>
    </clipPath>
  </defs>

  <!-- 背景 -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- 左侧光晕 -->
  <rect width="512" height="512" rx="110" fill="url(#glow)"/>

  <!-- 线1（最长，最亮）-->
  <rect x="136" y="185" width="240" height="18" rx="9" fill="url(#line1)"/>
  <!-- 高光 -->
  <rect x="148" y="188" width="108" height="5" rx="2.5" fill="white" fill-opacity="0.35"/>

  <!-- 线2（中等）-->
  <rect x="136" y="239" width="180" height="18" rx="9" fill="url(#line2)"/>
  <rect x="148" y="242" width="80"  height="5" rx="2.5" fill="white" fill-opacity="0.26"/>

  <!-- 线3（最短，最淡）-->
  <rect x="136" y="293" width="120" height="18" rx="9" fill="url(#line3)"/>
  <rect x="148" y="296" width="52"  height="5" rx="2.5" fill="white" fill-opacity="0.18"/>
</svg>